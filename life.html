<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профессия и навыки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #fafafa;
            min-height: 100vh;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .header-nav a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .header-nav a.active {
            color: #667eea;
            background: #f1f5f9;
        }
        .header-nav a:not(.active) {
            color: #64748b;
        }
        .header-nav a:not(.active):hover {
            color: #667eea;
            background: #f1f5f9;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-title h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f0f23;
            margin-bottom: 8px;
        }
        .page-title p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #667eea;
            color: #fff;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-secondary {
            background: #fff;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .btn svg {
            width: 16px;
            height: 16px;
        }
        .year-input {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.875rem;
            width: 100px;
            font-family: inherit;
        }
        .year-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .table-wrapper {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        thead {
            background: #f8fafc;
        }
        th {
            padding: 16px 20px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }
        td {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tbody tr:hover {
            background: #fafbfc;
        }

        .input-cell {
            width: 100%;
        }
        .input-cell input,
        .input-cell textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.875rem;
            color: #1a1a2e;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-cell input:focus,
        .input-cell textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-cell textarea {
            resize: vertical;
            min-height: 60px;
        }
        .input-cell.year-input {
            width: 100px;
        }
        .input-cell.year-input input {
            width: 100%;
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .delete-btn svg {
            width: 16px;
            height: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #94a3b8;
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .empty-state small {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .stats {
            display: flex;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px 20px;
            min-width: 150px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .container { padding: 24px 16px; }
            .page-title h1 { font-size: 1.5rem; }
            .actions { flex-direction: column; }
            .btn { justify-content: center; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <nav class="header-nav">
                <a href="index.html">Резюме</a>
                <a href="blog.html">Блог</a>
                <a href="projects.html">Проекты</a>
                <a href="test.html">Жизненный багаж</a>
                <a href="life.html" class="active">Профессия и навыки</a>
                <a href="info.html">Информационный контекст</a>
            </nav>
        </div>
    </header>

    <div class="container" x-data="{
        entries: [],
        newEntry: { year: '', occupation: '', skills: '' },

        init() {
            const saved = localStorage.getItem('professionSkills');
            if (saved) {
                this.entries = JSON.parse(saved);
            } else {
                this.entries = [
                    { id: 1, year: '2024', occupation: '', skills: '' },
                    { id: 2, year: '2023', occupation: '', skills: '' },
                    { id: 3, year: '2022', occupation: '', skills: '' }
                ];
            }
        },

        save() {
            localStorage.setItem('professionSkills', JSON.stringify(this.entries));
        },

        addEntry() {
            const year = this.newEntry.year.trim();
            if (!year) return;

            this.entries.unshift({
                id: Date.now(),
                year: year,
                occupation: '',
                skills: ''
            });
            this.newEntry = { year: '', occupation: '', skills: '' };
            this.save();
        },

        deleteEntry(id) {
            this.entries = this.entries.filter(e => e.id !== id);
            this.save();
        },

        updateEntry(id, field, value) {
            const entry = this.entries.find(e => e.id === id);
            if (entry) {
                entry[field] = value;
                this.save();
            }
        },

        downloadExcel() {
            const data = this.entries.map(e => ({
                'Год': e.year,
                'Занятие': e.occupation,
                'Какие у меня появились навыки?': e.skills
            }));

            if (data.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Профессия и навыки');

            const colWidths = [
                { wch: 10 },
                { wch: 40 },
                { wch: 50 }
            ];
            ws['!cols'] = colWidths;

            XLSX.writeFile(wb, 'профессия_и_навыки.xlsx');
        },

        clearAll() {
            if (confirm('Удалить все записи? Это действие нельзя отменить.')) {
                this.entries = [];
                this.save();
            }
        }
    }">

        <div class="page-title">
            <h1>Профессия и навыки</h1>
            <p>Отслеживайте развитие профессиональных навыков</p>
        </div>

        <div class="actions">
            <button class="btn btn-primary" @click="downloadExcel()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Скачать Excel
            </button>
            <input type="text"
                   x-model="newEntry.year"
                   @keydown.enter="addEntry()"
                   placeholder="Год"
                   class="year-input">
            <button class="btn btn-secondary" @click="addEntry()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Добавить год
            </button>
            <button class="btn btn-secondary" @click="clearAll()" x-show="entries.length > 0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Очистить все
            </button>
        </div>

        <template x-if="entries.length === 0">
            <div class="table-wrapper">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <p>Записей пока нет</p>
                    <small>Нажмите «Добавить год» чтобы начать</small>
                </div>
            </div>
        </template>

        <template x-if="entries.length > 0">
            <div class="table-wrapper">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 100px;">Год</th>
                                <th>Занятие</th>
                                <th>Какие у меня появились навыки?</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="entry in entries" :key="entry.id">
                                <tr>
                                    <td>
                                        <div class="input-cell year-input">
                                            <input type="text"
                                                   x-model="entry.year"
                                                   @input="updateEntry(entry.id, 'year', $event.target.value)"
                                                   placeholder="Год">
                                        </div>
                                    </td>
                                    <td>
                                        <div class="input-cell">
                                            <textarea x-model="entry.occupation"
                                                      @input="updateEntry(entry.id, 'occupation', $event.target.value)"
                                                      placeholder="Работа, учеба, проект..."
                                                      rows="2"></textarea>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="input-cell">
                                            <textarea x-model="entry.skills"
                                                      @input="updateEntry(entry.id, 'skills', $event.target.value)"
                                                      placeholder="Какие навыки приобрели?"
                                                      rows="2"></textarea>
                                        </div>
                                    </td>
                                    <td>
                                        <button class="delete-btn" @click="deleteEntry(entry.id)" title="Удалить">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <div class="stats" x-show="entries.length > 0">
            <div class="stat-item">
                <div class="stat-value" x-text="entries.length"></div>
                <div class="stat-label">Записей</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" x-text="entries.filter(e => e.occupation.trim()).length"></div>
                <div class="stat-label">С занятиями</div>
            </div>
        </div>

    </div>
</body>
</html>
