<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог — Галкин Александр</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #fafafa;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #0f0f23;
        }
        .header-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
        }
        .header-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .header-nav {
            display: flex;
            gap: 8px;
        }
        .header-nav a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            color: #64748b;
            transition: all 0.2s;
        }
        .header-nav a:hover {
            color: #667eea;
            background: #f1f5f9;
        }
        .header-nav a.active {
            color: #667eea;
            background: #f1f5f9;
        }

        /* Main */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Hero */
        .blog-hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .blog-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f0f23;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .blog-hero p {
            font-size: 1.1rem;
            color: #64748b;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Blog */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .blog-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        .blog-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        .blog-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .blog-card-date {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .blog-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f0f23;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .blog-card-excerpt {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 16px;
            flex: 1;
        }
        .blog-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .blog-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            background: #f1f5f9;
            color: #64748b;
        }
        .blog-tag.active {
            background: #667eea;
            color: #fff;
        }
        .blog-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
            justify-content: center;
        }
        .blog-filter-btn {
            font-size: 0.85rem;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .blog-filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .blog-filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        .blog-loading {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
            font-size: 1rem;
        }
        .blog-empty {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }

        /* Modal */
        .blog-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .blog-modal-content {
            background: #fff;
            border-radius: 16px;
            max-width: 760px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            position: relative;
        }
        .blog-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .blog-modal-close:hover {
            background: #e2e8f0;
            color: #0f0f23;
        }
        .blog-modal-header {
            padding: 32px 32px 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .blog-modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f0f23;
            margin-bottom: 12px;
            padding-right: 50px;
            line-height: 1.3;
        }
        .blog-modal-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .blog-modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .blog-modal-body {
            padding: 32px;
            color: #475569;
            line-height: 1.8;
        }
        .blog-modal-body h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f0f23;
            margin: 28px 0 14px;
        }
        .blog-modal-body h2:first-child {
            margin-top: 0;
        }
        .blog-modal-body h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin: 24px 0 12px;
        }
        .blog-modal-body p {
            margin-bottom: 16px;
        }
        .blog-modal-body ul, .blog-modal-body ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }
        .blog-modal-body li {
            margin-bottom: 8px;
        }
        .blog-modal-body code {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.875em;
            color: #667eea;
        }
        .blog-modal-body pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px 24px;
            border-radius: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        .blog-modal-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .blog-modal-body strong {
            color: #334155;
            font-weight: 600;
        }
        .blog-modal-body a {
            color: #667eea;
            text-decoration: none;
        }
        .blog-modal-body a:hover {
            text-decoration: underline;
        }
        .blog-modal-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #64748b;
            font-style: italic;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 24px;
            color: #94a3b8;
            font-size: 0.875rem;
            border-top: 1px solid #e2e8f0;
            background: #fff;
        }

        @media (max-width: 640px) {
            .header-nav a:not(.active) {
                display: none;
            }
            .blog-hero h1 {
                font-size: 2rem;
            }
            .blog-modal-content {
                max-height: 92vh;
            }
            .blog-modal-header, .blog-modal-body {
                padding: 24px 20px;
            }
            .blog-modal-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="header-logo">
                <img src="avatar.png" alt="Галкин Александр" width="40" height="40">
                <span class="header-name">Галкин Александр</span>
            </a>
            <nav class="header-nav">
                <a href="index.html" title="Резюме"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
                <a href="blog.html" class="active" title="Блог"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg></a>
                <a href="projects.html" title="Проекты"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></a>
                <a href="pytest.html" title="Pytest"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></a>
                <a href="xpath.html" title="XPath"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><path d="M8 12l4 4 4-4"></path><path d="M8 18l4-4 4 4"></path></svg></a>
                <a href="test.html" title="Жизненный багаж"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg></a>
                <a href="life.html" title="Профессия и навыки"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg></a>
                <a href="info.html" title="Информационный контекст"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="container" x-data="{
        blogArticles: [],
        blogFilter: 'all',
        blogLoading: true,
        blogSelected: null,
        blogModalContent: '',
        get filteredArticles() {
            if (this.blogFilter === 'all') return this.blogArticles;
            return this.blogArticles.filter(a => a.tags.includes(this.blogFilter));
        },
        get allTags() {
            const tags = new Set();
            this.blogArticles.forEach(a => a.tags.forEach(t => tags.add(t)));
            return Array.from(tags);
        },
        async loadBlog() {
            try {
                const res = await fetch('articles.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                this.blogArticles = await res.json();
                console.log('Loaded articles:', this.blogArticles.length);
                this.blogLoading = false;
            } catch (e) {
                console.error('Failed to load articles:', e);
                this.blogLoading = false;
            }
        },
        openArticle(article) {
            this.blogSelected = article;
            this.blogModalContent = marked.parse(article.content);
        },
        closeArticle() {
            this.blogSelected = null;
            this.blogModalContent = '';
        }
    }" x-init="loadBlog()">

        <!-- Hero -->
        <div class="blog-hero">
            <h1>Блог</h1>
            <p>Статьи о тестировании, автоматизации и разработке</p>
        </div>

        <!-- Blog content -->
        <template x-if="blogLoading">
            <div class="blog-loading">Загрузка статей...</div>
        </template>

        <template x-if="!blogLoading && filteredArticles.length === 0">
            <div class="blog-empty">Нет статей с выбранным тегом</div>
        </template>

        <template x-if="!blogLoading">
            <div>
                <!-- Tags filter -->
                <div class="blog-filter">
                    <button class="blog-filter-btn"
                            :class="{ 'active': blogFilter === 'all' }"
                            @click="blogFilter = 'all'">
                        Все
                    </button>
                    <template x-for="tag in allTags" :key="tag">
                        <button class="blog-filter-btn"
                                :class="{ 'active': blogFilter === tag }"
                                @click="blogFilter = tag">
                            <span x-text="tag"></span>
                        </button>
                    </template>
                </div>

                <!-- Articles grid -->
                <div class="blog-grid">
                    <template x-for="article in filteredArticles" :key="article.id">
                        <article class="blog-card" @click="openArticle(article)">
                            <div class="blog-card-header">
                                <span class="blog-card-date" x-text="article.date"></span>
                            </div>
                            <h2 class="blog-card-title" x-text="article.title"></h2>
                            <p class="blog-card-excerpt" x-text="article.excerpt"></p>
                            <div class="blog-card-tags">
                                <template x-for="tag in article.tags" :key="tag">
                                    <span class="blog-tag" x-text="tag"></span>
                                </template>
                            </div>
                        </article>
                    </template>
                </div>
            </div>
        </template>

        <!-- Modal -->
        <template x-if="blogSelected">
            <div class="blog-modal"
                 @click.self="closeArticle()"
                 @keydown.escape.window="closeArticle()">
                <div class="blog-modal-content" @click.stop>
                    <button class="blog-modal-close" @click="closeArticle()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <div class="blog-modal-header">
                        <h2 class="blog-modal-title" x-text="blogSelected.title"></h2>
                        <div class="blog-modal-meta">
                            <span x-text="blogSelected.date"></span>
                        </div>
                        <div class="blog-modal-tags">
                            <template x-for="tag in blogSelected.tags" :key="tag">
                                <span class="blog-tag" x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                    <div class="blog-modal-body" x-html="blogModalContent"></div>
                </div>
            </div>
        </template>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Галкин Александр &copy; <span x-text="new Date().getFullYear()"></span></p>
    </footer>
</body>
</html>
