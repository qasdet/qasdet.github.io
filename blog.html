<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог — Галкин Александр</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            text-align: center;
            margin-bottom: 96px;
            padding: 48px 24px;
            animation: fadeInDown 0.8s ease-out;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md), 0 0 80px rgba(124, 58, 237, 0.05);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
        }

        .hero h1 {
            font-size: 2.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1.35rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 28px;
            letter-spacing: -0.01em;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .blog-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .blog-card::after {
            content: '';
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .blog-card:hover {
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(124, 58, 237, 0.1);
            transform: translateY(-8px);
        }

        .blog-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .blog-card-date {
            font-size: 0.8rem;
            color: var(--primary);
            white-space: nowrap;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            background: rgba(124, 58, 237, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(124, 58, 237, 0.12);
        }

        .blog-card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
            flex: 1;
            letter-spacing: -0.01em;
        }

        .blog-card-excerpt {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 16px;
            flex: 1;
        }

        .blog-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .blog-tag {
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(124, 58, 237, 0.08);
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        .blog-tag:hover {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            border-color: transparent;
            transform: scale(1.05);
        }

        .blog-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
        }

        .blog-filter-btn {
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blog-filter-btn:hover {
            border-color: rgba(124, 58, 237, 0.3);
            color: var(--primary);
            transform: translateY(-2px);
            background: rgba(124, 58, 237, 0.05);
        }

        .blog-filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .blog-empty {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            color: var(--text-secondary);
            text-align: center;
            padding: 32px;
            margin-bottom: 24px;
            font-weight: 500;
            font-size: 1rem;
        }

        .blog-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        .blog-modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            max-width: 720px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow-xl), 0 0 0 1px var(--border);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blog-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(124, 58, 237, 0.1);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            font-size: 0;
        }

        .blog-modal-close:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(90deg) scale(1.05);
        }

        .blog-modal-header {
            padding: 32px 32px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .blog-modal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
        }

        .blog-modal-title {
            font-size: 1.5rem;
            line-height: 1.35;
            margin-bottom: 12px;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .blog-modal-meta {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .blog-modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .blog-modal-body {
            padding: 28px 32px 36px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .blog-modal-body h2,
        .blog-modal-body h3 {
            color: var(--text-primary);
            margin: 24px 0 14px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .blog-modal-body p,
        .blog-modal-body ul,
        .blog-modal-body pre {
            margin-bottom: 16px;
        }

        .blog-modal-body pre {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'Geist Mono', monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border-light);
        }

        .loading-stage {
            text-align: center;
            padding: 60px 24px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 36px 20px;
                margin-bottom: 56px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .hero {
                padding: 28px 16px;
            }

            .hero h1 {
                font-size: 1.75rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .blog-card {
                padding: 24px;
            }

            .blog-modal-header {
                padding: 24px 20px 16px;
            }

            .blog-modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
            }
        });
        document.addEventListener('selectstart', e => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
            }
        });
    </script>

    <header class="header">
        <div class="header-inner">
            <nav class="header-nav">
                <a href="index.html">📄 Резюме</a>
                <a href="about.html">👤 Обо мне</a>
                <a href="blog.html" class="active">📝 Блог</a>
                <a href="projects.html">💻 Проекты</a>
                <div class="nav-group">
                    <a href="pytest.html" class="nav-group-toggle">
                        🎓 Обучение
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </a>
                    <div class="nav-group-dropdown">
                        <a href="pytest.html" title="Pytest">Pytest</a>
                        <a href="xpath.html" title="XPath">XPath</a>
                        <a href="framework.html" title="Playwright + Pytest">Playwright + Pytest</a>
                        <a href="theory_testing.html" title="Теория тестирования">Теория тестирования</a>
                    </div>
                </div>
                <div class="nav-group">
                    <a href="test.html" class="nav-group-toggle">
                        🎯 Опыт
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </a>
                    <div class="nav-group-dropdown">
                        <a href="test.html" title="Жизненный багаж">Жизненный багаж</a>
                        <a href="life.html" title="Профессия и навыки">Профессия и навыки</a>
                        <a href="info.html" title="Информационный контекст">Инфо контекст</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" x-data="{
        blogArticles: [],
        blogFilter: 'all',
        blogLoading: true,
        blogSelected: null,
        blogModalContent: '',
        get filteredArticles() {
            if (this.blogFilter === 'all') return this.blogArticles;
            return this.blogArticles.filter(a => a.tags.includes(this.blogFilter));
        },
        get allTags() {
            const tags = new Set();
            this.blogArticles.forEach(a => a.tags.forEach(t => tags.add(t)));
            return Array.from(tags);
        },
        async loadBlog() {
            try {
                const res = await fetch('articles.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                this.blogArticles = await res.json();
                console.log('Loaded articles:', this.blogArticles.length);
                this.blogLoading = false;
            } catch (e) {
                console.error('Failed to load articles:', e);
                this.blogLoading = false;
            }
        },
        openArticle(article) {
            this.blogSelected = article;
            this.blogModalContent = marked.parse(article.content);
        },
        closeArticle() {
            this.blogSelected = null;
            this.blogModalContent = '';
        }
    }" x-init="loadBlog()">

        <section class="hero">
            <h1>Блог</h1>
            <p class="hero-subtitle">Статьи о тестировании, автоматизации и разработке</p>
        </section>

        <template x-if="blogLoading">
            <div class="loading-stage">
                <div class="loading-spinner"></div>
                <div class="loading-text">Загрузка статей...</div>
            </div>
        </template>

        <template x-if="!blogLoading && filteredArticles.length === 0">
            <div class="blog-empty">Нет статей с выбранным тегом</div>
        </template>

        <template x-if="!blogLoading">
            <div>
                <div class="blog-filter">
                    <button class="blog-filter-btn"
                            :class="{ 'active': blogFilter === 'all' }"
                            @click="blogFilter = 'all'">
                        Все
                    </button>
                    <template x-for="tag in allTags" :key="tag">
                        <button class="blog-filter-btn"
                                :class="{ 'active': blogFilter === tag }"
                                @click="blogFilter = tag">
                            <span x-text="tag"></span>
                        </button>
                    </template>
                </div>

                <div class="blog-grid">
                    <template x-for="article in filteredArticles" :key="article.id">
                        <article class="blog-card" @click="openArticle(article)">
                            <div class="blog-card-header">
                                <span class="blog-card-date" x-text="article.date"></span>
                            </div>
                            <h2 class="blog-card-title" x-text="article.title"></h2>
                            <p class="blog-card-excerpt" x-text="article.excerpt"></p>
                            <div class="blog-card-tags">
                                <template x-for="tag in article.tags" :key="tag">
                                    <span class="blog-tag" x-text="tag"></span>
                                </template>
                            </div>
                        </article>
                    </template>
                </div>
            </div>
        </template>

        <template x-if="blogSelected">
            <div class="blog-modal"
                 @click.self="closeArticle()"
                 @keydown.escape.window="closeArticle()">
                <div class="blog-modal-content" @click.stop>
                    <button class="blog-modal-close" @click="closeArticle()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <div class="blog-modal-header">
                        <h2 class="blog-modal-title" x-text="blogSelected.title"></h2>
                        <div class="blog-modal-meta">
                            <span x-text="blogSelected.date"></span>
                        </div>
                        <div class="blog-modal-tags">
                            <template x-for="tag in blogSelected.tags" :key="tag">
                                <span class="blog-tag" x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                    <div class="blog-modal-body" x-html="blogModalContent"></div>
                </div>
            </div>
        </template>
    </main>

    <footer class="footer">
        <p>Создано с 💜 на Alpine.js | 2026<span x-text="new Date().getFullYear()"></span></p>
    </footer>
</body>
</html>
